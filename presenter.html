<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter Console - Semiconductor Ecosystem</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: var(--font-ui);
        }
        #presenter-console-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100vh;
            background: var(--color-surface);
        }
        .console-header {
            padding: 1rem 2rem;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .console-title {
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .timer-section {
            padding: 1rem 2rem;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .timer-display {
            font-family: var(--font-mono);
            font-size: 36px;
            font-weight: 500;
            color: var(--color-text);
        }
        .timer-controls {
            display: flex;
            gap: 0.5rem;
        }
        .pacing-guide {
            font-family: var(--font-ui);
            font-size: 13px;
            color: var(--color-text-muted);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .pacing-target {
            font-weight: 500;
            color: var(--color-text);
        }
        .script-section {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .script-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .text-resize {
            display: flex;
            gap: 0.25rem;
        }
        .text-resize button {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-ui);
            font-size: 13px;
            cursor: pointer;
        }
        .script-label {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .script-text {
            font-family: var(--font-ui);
            font-size: 16px;
            line-height: 1.6;
            color: var(--color-text);
            white-space: pre-wrap;
            padding-bottom: 4rem;
            user-select: text;
        }
        .preview-section {
            padding: 1rem 2rem;
            background: var(--color-bg);
            border-top: 1px solid var(--color-border);
            display: flex;
            gap: 1.5rem;
        }
        .preview-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .preview-box-label {
            font-family: var(--font-ui);
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .preview-box-title {
            font-family: var(--font-primary);
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .console-footer-nav {
            padding: 1.25rem 2rem;
            background: var(--color-surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--color-border);
        }
        .autoscroll-toggle {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: var(--font-ui);
            font-size: 13px;
            color: var(--color-text-muted);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="presenter-console-container">
        <!-- Header -->
        <div class="console-header">
            <div class="console-title">
                <i data-lucide="presentation" class="lucide-sm" style="color: var(--color-primary);"></i>
                Presenter Console (MacBook Screen)
            </div>
            <div class="autoscroll-toggle">
                <input type="checkbox" id="chk-autoscroll" checked>
                <label for="chk-autoscroll">Auto-scroll Teleprompter</label>
            </div>
        </div>

        <!-- Timer Panel -->
        <div class="timer-section">
            <div class="timer-display" id="timer-display">00:00</div>
            <div class="timer-controls">
                <button class="timer-btn" id="btn-timer-play">Start</button>
                <button class="timer-btn" id="btn-timer-reset">Reset</button>
            </div>
            <div class="pacing-guide">
                <span id="pacing-target" class="pacing-target">Target: < 01:30</span>
                <span id="pacing-status">Timer inactive</span>
            </div>
        </div>

        <!-- Speaker Script Text Area -->
        <div class="script-section">
            <div class="script-controls">
                <span class="script-label">Speaking Script</span>
                <div class="text-resize">
                    <button id="btn-text-dec" title="Decrease size">A-</button>
                    <button id="btn-text-inc" title="Increase size">A+</button>
                </div>
            </div>
            <div class="script-text script-font-md" id="script-text">Syncing presentation script...</div>
        </div>

        <!-- Current/Next Slide Preview -->
        <div class="preview-section">
            <div class="preview-box">
                <span class="preview-box-label">Current Slide</span>
                <div class="preview-box-title" id="preview-current-title">1. Cover Title</div>
            </div>
            <div class="preview-box" style="border-left: 1px solid var(--color-border); padding-left: 1.5rem;">
                <span class="preview-box-label">Next Slide</span>
                <div class="preview-box-title" id="preview-next-title">2. Agenda</div>
            </div>
        </div>

        <!-- Bottom Navigation Controls -->
        <div class="console-footer-nav">
            <button class="btn-nav" id="btn-prev">
                <i data-lucide="chevron-left" class="lucide-sm"></i> Previous Slide
            </button>
            <div class="slide-number-indicator" id="slide-num-indicator" style="font-size: 14px; font-weight: 500; font-family: var(--font-ui); color: var(--color-text-muted);">Slide 1 of 19</div>
            <button class="btn-nav" id="btn-next">
                Next Slide <i data-lucide="chevron-right" class="lucide-sm"></i>
            </button>
        </div>
    </div>

    <script src="presenter.js"></script>
</body>
</html>
